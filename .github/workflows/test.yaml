name: 📦 Tests

on:
  push:
    branches: [master]
    paths:
      - src/**
      - tests/**
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - src/**
      - tests/**

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run build --noEmit

      - name: Run unit tests
        run: bun test tests/unit/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun test tests/*.test.ts --timeout 300000
        env:
          API_KEY: ${{ secrets.CAPMONSTER_API_KEY }}

      - name: Run solve tests
        run: bun test tests/solve.test.ts --timeout 120000
        env:
          API_KEY: ${{ secrets.CAPMONSTER_API_KEY }}
